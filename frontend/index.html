<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Expense Automation</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h1>AI Expense Automation</h1>

<form id="expenseForm">

<input type="text" id="employee_name" placeholder="Employee Name" required>

<input type="email" id="employee_email" placeholder="Employee Email" required>

<input type="text" id="vendor" placeholder="Vendor" required>

<input type="number" id="amount" placeholder="Amount" required>

<input type="text" id="category" placeholder="Category" required>

<input type="date" id="expense_date" required>

<button type="submit">Submit Expense</button>

</form>

<p id="status"></p>

</div>

<script src="script.js"></script>

</body>
</html>
